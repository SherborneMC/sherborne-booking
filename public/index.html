
<!doctype html>
<html><body>
<form id='f'>
<input id='email'/><input id='assistant'/>
<button>Send</button>
</form>
<script>
document.getElementById('f').onsubmit=async e=>{
 e.preventDefault();
 const res = await fetch('/api/alternative',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,otherEmail:assistant.value})});
 if(res.ok){
   document.body.innerHTML='<h2>Thank you for your request.</h2><p>Please explore <a href="https://www.sherbornecmc.com">Sherborne</a></p>';
   setTimeout(()=>location.href='https://www.sherbornecmc.com',30000);
 }
 else alert('Error');
}
</script>
</body></html>
