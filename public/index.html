<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sherborne — Introductory consultation</title><style>
:root{--brand:#36463b;--ink:#17201c;--muted:#707870;--faint:#a7aca5;--line:#e7e1d8;--paper:#fffdf8;--soft:#f7f3ec;--slot:#edf3ec;--slot-hover:#e2ece1;--requested:#f0eadf;--danger:#8f3f35;--time:70px;--shadow:0 22px 62px rgba(23,32,28,.16)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--paper),var(--soft));color:var(--ink)}button,input,textarea{font:inherit}.page{max-width:1180px;margin:auto;padding:30px 24px 42px}.word{font-family:Georgia,"Times New Roman",serif;letter-spacing:.22em;text-decoration:none;color:var(--brand);font-weight:700}.top{margin:36px 0 24px}h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;color:var(--brand);font-size:clamp(34px,4vw,54px);line-height:1.04;margin:0}.shell{border:1px solid var(--line);border-radius:28px;background:rgba(255,253,248,.88);overflow:hidden;box-shadow:0 24px 78px rgba(54,70,59,.08);transition:opacity .28s ease,transform .28s ease}.shell.updating{opacity:.35}.bar{height:66px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:0 16px 0 20px;background:rgba(255,255,255,.55)}.week{font-weight:600;color:var(--brand)}.nav{display:flex;gap:8px}.round{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--brand);cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center}.round:disabled{opacity:.28;cursor:default}.days,.grid{display:grid;grid-template-columns:var(--time) repeat(5,1fr)}.days{border-bottom:1px solid var(--line);background:#fff}.head{min-height:72px;padding:13px 10px;border-left:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;transition:opacity .2s}.head.empty{opacity:.42}.dow{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.date{font-size:24px;font-weight:600;color:var(--brand)}.time{font-size:12px;color:var(--muted);padding:8px 10px 0 0;text-align:right;border-top:1px solid var(--line);min-height:38px}.cell{min-height:38px;border-left:1px solid var(--line);border-top:1px solid var(--line);padding:5px 7px;display:flex;align-items:center;justify-content:center}.slot{width:100%;height:27px;border:0;background:var(--slot);color:var(--brand);border-radius:11px;font-size:13px;font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;transition:background .22s ease,transform .22s ease,opacity .22s ease}.slot:hover,.slot.sel{background:var(--slot-hover);transform:translateY(-1px)}.slot.requested{background:var(--requested);color:var(--muted);cursor:default;transform:none}.mobileDays{display:none}.foot{margin-top:24px;border:1px solid var(--line);border-radius:24px;background:rgba(255,253,248,.72);padding:22px;display:flex;justify-content:space-between;align-items:center;gap:18px;color:var(--muted)}.foot p{margin:0}.foot a,.secondary{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 16px;text-decoration:none;color:var(--brand);display:inline-flex;align-items:center;justify-content:center;text-align:center}.meta{margin-top:12px;text-align:right;color:var(--faint);font-size:11px;min-height:16px}.overlay{position:fixed;inset:0;background:rgba(23,32,28,.18);opacity:0;pointer-events:none;transition:.22s;z-index:8}.overlay.open{opacity:1;pointer-events:auto}.panel{position:fixed;top:0;left:0;height:100dvh;width:min(430px,92vw);background:var(--paper);box-shadow:var(--shadow);z-index:9;transform:translateX(-105%);transition:.34s cubic-bezier(.2,.8,.2,1);padding:22px;display:flex;flex-direction:column;border-right:1px solid var(--line);overflow:auto}.panel.open{transform:translateX(0)}.ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.panel h2{font-family:Georgia,"Times New Roman",serif;font-weight:400;color:var(--brand);font-size:30px;margin:0}.x{border:0;background:transparent;color:var(--muted);font-size:28px;cursor:pointer}.selected{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;margin-bottom:16px;color:var(--brand);font-weight:600}form{display:grid;gap:12px}label{display:grid;gap:6px;font-size:13px;color:var(--muted)}.field-title{display:inline-flex;align-items:center;gap:4px}.req{color:var(--brand);font-weight:700}input,textarea{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;color:var(--ink)}textarea{min-height:108px;resize:vertical}.err{border-color:var(--danger)!important;box-shadow:0 0 0 4px rgba(143,63,53,.1)}.msg{font-size:12px;color:var(--danger);min-height:13px}.primary{border:0;border-radius:999px;background:var(--brand);color:white;padding:13px 18px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center}.primary:disabled{opacity:.65;cursor:wait}.extra-person{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.58);display:grid;gap:10px}.check-row{display:flex;align-items:center;gap:8px;color:var(--brand);font-size:13px}.check-row input{width:auto}.thanks{display:none;gap:18px;color:var(--muted);line-height:1.55}.thanks.open{display:grid}.thanks strong{font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:400;color:var(--brand)}.toast{position:fixed;right:20px;bottom:20px;background:var(--brand);color:white;border-radius:16px;padding:14px 16px;display:none;z-index:10;max-width:360px}.toast.open{display:block}@media(max-width:760px){:root{--time:58px}.page{padding:20px 14px 34px}.top{display:grid;margin-top:24px}.bar{height:auto;padding:12px}.days,.grid{grid-template-columns:var(--time) 1fr}.head{display:none}.head.active{display:flex;grid-column:2}.days:before{content:"";grid-column:1}.cell:not(.active){display:none}.mobileDays{display:flex;gap:6px;overflow:auto;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff}.mdb{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;color:var(--brand)}.mdb.active{background:var(--brand);color:white}.mdb.empty{opacity:.45}.foot{display:grid}.primary{position:sticky;bottom:8px;z-index:2;box-shadow:0 8px 20px rgba(23,32,28,.18)}.toast{left:14px;right:14px;bottom:14px;max-width:none}.meta{text-align:center}}@media(max-width:760px) and (orientation:portrait){.panel{top:auto;bottom:0;width:100vw;height:auto;max-height:88dvh;border-radius:24px 24px 0 0;transform:translateY(105%);border-right:0}.panel.open{transform:translateY(0)}}
</style></head><body><div class="page"><a class="word" href="https://www.sherbornecmc.com">SHERBORNE</a><div class="top"><h1>Introductory consultation</h1></div><section class="shell" id="shell" aria-label="Available consultation times"><div class="bar"><div class="week" id="week" aria-live="polite"></div><div class="nav"><button class="round" id="prev" aria-label="Previous dates">‹</button><button class="round" id="next" aria-label="Next dates">›</button></div></div><div class="mobileDays" id="mobileDays" aria-label="Choose date"></div><div id="cal"></div></section><div class="meta" id="meta">v12 · —</div><section class="foot"><p>Discreet and trusted</p><a href="https://www.sherbornecmc.com">Explore Sherborne</a></section></div><div class="overlay" id="ov"></div><aside class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="ptitle"><div class="ptop"><h2 id="ptitle">Booking request</h2><button class="x" id="close" aria-label="Close booking request">×</button></div><div id="formView"><div class="selected" id="sel"></div><form id="form" novalidate><label><span class="field-title">Name <span class="req">*</span></span><input id="visitorName" autocomplete="name" aria-describedby="nmsg"></label><div class="msg" id="nmsg" aria-live="polite"></div><label><span class="field-title">Email <span class="req">*</span></span><input id="visitorEmail" autocomplete="email" inputmode="email" aria-describedby="emsg"></label><div class="msg" id="emsg" aria-live="polite"></div><label><span class="field-title">Phone <span class="req">*</span></span><input id="visitorPhone" autocomplete="tel" inputmode="tel" placeholder="UK or international number" aria-describedby="pmsg"></label><div class="msg" id="pmsg" aria-live="polite"></div><label><span class="field-title">What would be most helpful to explore? <span class="req">*</span></span><textarea id="visitorMessage" maxlength="250" aria-describedby="mmsg count"></textarea></label><div class="msg" id="mmsg" aria-live="polite"></div><div style="font-size:13px;color:var(--muted)"><span id="count">0</span>/250</div><div class="extra-person"><label class="check-row"><input type="checkbox" id="sendOther"> Also send this request to someone else</label><label id="otherNameWrap" style="display:none"><span class="field-title">Other person’s name</span><input id="otherName" autocomplete="name"></label><label id="otherEmailWrap" style="display:none"><span class="field-title">Other person’s email</span><input id="otherEmail" inputmode="email" autocomplete="email" aria-describedby="otherMsg"></label><div class="msg" id="otherMsg" aria-live="polite"></div></div><button class="primary" id="submitBtn">Request consultation</button></form></div><div class="thanks" id="thanks"><strong>Thank you for your request.</strong><p>We will confirm shortly and have provided a provisional hold for your diary.</p><a class="secondary" href="https://www.sherbornecmc.com">Explore Sherborne</a></div></aside><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const VERSION='v12';const el=id=>document.getElementById(id);const short=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['January','February','March','April','May','June','July','August','September','October','November','December'];let rawSlots=[],displaySlots=[],slotsById=new Map(),page=0,active=0,chosen=null,chosenBtn=null,requested=new Map();function localHM(d=new Date()){return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}function setMeta(t){el('meta').textContent=t||`${VERSION} · ${localHM()}`;}function localDateKey(date){let d=new Date(date),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`}function localTimeKey(date){let d=new Date(date);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}function prettyDateFromKey(k){let [y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}function fmtSlot(slot){return new Date(slot.startUtc).toLocaleString([], {weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});}function toast(t){let x=el('toast');x.textContent=t;x.classList.add('open');setTimeout(()=>x.classList.remove('open'),4500)}function loadRequested(){try{let raw=JSON.parse(localStorage.getItem('sherborneRequestedSlots')||'{}'),now=Date.now();requested=new Map(Object.entries(raw).filter(([k,v])=>v>now));saveRequested();}catch{requested=new Map();}}function saveRequested(){localStorage.setItem('sherborneRequestedSlots',JSON.stringify(Object.fromEntries(requested)));}function markRequested(slotId){requested.set(slotId,Date.now()+12*60*60*1000);saveRequested();render();}function enrichSlots(){displaySlots=rawSlots.filter(s=>s.withinIntro).map(s=>{let d=new Date(s.startUtc);return {...s,displayDate:localDateKey(d),displayTime:localTimeKey(d)}});slotsById=new Map(displaySlots.map(s=>[s.id,s]));}function uniqueDates(){let seen=[];for(const s of displaySlots){if(!seen.includes(s.displayDate))seen.push(s.displayDate)}return seen.sort()}function visibleDates(){let dates=uniqueDates();let start=page*5;return dates.slice(start,start+5)}function dayHasAvailability(k){return displaySlots.some(s=>s.displayDate===k&&s.bookable&&!requested.has(s.id))}function rowTimes(dates){let set=new Set();for(const s of displaySlots){if(dates.includes(s.displayDate)&&s.bookable)set.add(s.displayTime)}return [...set].sort()}function firstPageWithAvailability(){let dates=uniqueDates();for(let p=0;p<Math.ceil(dates.length/5);p++){if(dates.slice(p*5,p*5+5).some(dayHasAvailability))return p}return 0}function firstActive(dates){let i=dates.findIndex(dayHasAvailability);return i<0?0:i}function sampleFallback(){rawSlots=[];let now=new Date();for(let i=1;i<20;i++){let d=new Date(now);d.setDate(now.getDate()+i);if(d.getDay()===0||d.getDay()===6)continue;for(let t of ['08:30','10:00','11:30','16:30','17:00']){let [h,m]=t.split(':').map(Number);let x=new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m);rawSlots.push({id:`sample-${i}-${t}`,startUtc:x.toISOString(),endUtc:new Date(x.getTime()+1800000).toISOString(),withinIntro:true,bookable:true});}}enrichSlots();}
async function load(showUpdate=false){try{if(showUpdate){el('shell').classList.add('updating');setMeta('Updating…')}let r=await fetch('/api/availability',{cache:'no-store'});if(!r.ok)throw new Error('availability');let j=await r.json();rawSlots=j.slots||[];enrichSlots();}catch(e){sampleFallback();toast('We could not reach the live calendar. Please try again later or contact Sherborne.')}if(showUpdate){setTimeout(()=>{el('shell').classList.remove('updating');setMeta();},5000)}else setMeta();}
function render(){let dates=visibleDates();if(!dates.length){el('cal').innerHTML='';el('week').textContent='No current availability';return}if(active>=dates.length)active=0;if(!dates[active]||!dayHasAvailability(dates[active]))active=firstActive(dates);let first=prettyDateFromKey(dates[0]),last=prettyDateFromKey(dates[dates.length-1]);el('week').textContent=`${first.getDate()} ${months[first.getMonth()]} – ${last.getDate()} ${months[last.getMonth()]} ${last.getFullYear()}`;let maxPage=Math.max(0,Math.ceil(uniqueDates().length/5)-1);el('prev').disabled=page<=0;el('next').disabled=page>=maxPage;el('mobileDays').innerHTML='';dates.forEach((k,i)=>{let d=prettyDateFromKey(k),b=document.createElement('button');b.className='mdb'+(i===active?' active':'')+(dayHasAvailability(k)?'':' empty');b.textContent=`${short[d.getDay()]} ${d.getDate()}`;b.setAttribute('aria-label',d.toLocaleDateString([], {weekday:'long',day:'numeric',month:'long'}));b.onclick=()=>{active=i;render()};el('mobileDays').appendChild(b)});let rows=rowTimes(dates);let h='<div class="days"><div></div>';dates.forEach((k,i)=>{let d=prettyDateFromKey(k);h+=`<div class="head ${dayHasAvailability(k)?'':'empty'} ${i===active?'active':''}"><div class="dow">${short[d.getDay()]}</div><div class="date">${d.getDate()}</div></div>`});h+='</div><div class="grid">';rows.forEach(r=>{h+=`<div class="time">${r}</div>`;dates.forEach((k,i)=>{let candidates=displaySlots.filter(s=>s.displayDate===k&&s.displayTime===r&&s.bookable);let s=candidates[0],req=s&&requested.has(s.id);h+=`<div class="cell ${i===active?'active':''}">`;if(s)h+=`<button class="slot ${req?'requested':''}" data-id="${s.id}" ${req?'disabled':''} aria-label="Request ${fmtSlot(s)}">${req?'Requested':'Request'}</button>`;h+='</div>'})});h+='</div>';el('cal').innerHTML=h;el('cal').querySelectorAll('.slot:not(.requested)').forEach(b=>b.onclick=()=>select(b));}
function openP(){el('ov').classList.add('open');el('panel').classList.add('open')}function closeP(){el('ov').classList.remove('open');el('panel').classList.remove('open');if(chosenBtn)chosenBtn.classList.remove('sel')}function select(b){if(chosenBtn)chosenBtn.classList.remove('sel');chosenBtn=b;b.classList.add('sel');chosen=slotsById.get(b.dataset.id);el('sel').textContent=fmtSlot(chosen);el('formView').style.display='block';el('thanks').classList.remove('open');el('ptitle').textContent='Booking request';openP()}function setErr(inputId,msgId,txt){el(inputId).classList.toggle('err',!!txt);el(msgId).textContent=txt}function valid(){let name=el('visitorName').value.trim(),email=el('visitorEmail').value.trim(),phone=el('visitorPhone').value.trim(),msg=el('visitorMessage').value.trim();let no=name.length>0,eo=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email),po=phone.length>=7,mo=msg.length>0,otherOk=true;setErr('visitorName','nmsg',no?'':'Please enter your name.');setErr('visitorEmail','emsg',eo?'':'Please enter a valid email address.');setErr('visitorPhone','pmsg',po?'':'Please enter at least 7 characters.');setErr('visitorMessage','mmsg',mo?'':'Please add a short message.');if(el('sendOther').checked&&el('otherEmail').value.trim())otherOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el('otherEmail').value.trim());el('otherMsg').textContent=otherOk?'':'Please enter a valid email address for the other person.';el('otherEmail').classList.toggle('err',!otherOk);return no&&eo&&po&&mo&&otherOk}async function refresh(){if(document.visibilityState!=='visible')return;await load(true);render();}function movePage(n){let maxPage=Math.max(0,Math.ceil(uniqueDates().length/5)-1),next=Math.max(0,Math.min(maxPage,page+n));if(next!==page){page=next;active=0;render()}}function moveDay(n){let dates=visibleDates(),next=active+n;if(next<0&&page>0){page--;active=4;render();return}if(next>=dates.length&&page<Math.ceil(uniqueDates().length/5)-1){page++;active=0;render();return}active=Math.max(0,Math.min(dates.length-1,next));render()}el('close').onclick=closeP;el('ov').onclick=closeP;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeP()});el('prev').onclick=()=>movePage(-1);el('next').onclick=()=>movePage(1);el('visitorMessage').oninput=()=>el('count').textContent=el('visitorMessage').value.length;el('sendOther').onchange=()=>{el('otherNameWrap').style.display=el('sendOther').checked?'grid':'none';el('otherEmailWrap').style.display=el('sendOther').checked?'grid':'none';el('otherMsg').textContent=''};el('form').onsubmit=async e=>{e.preventDefault();if(!valid())return;if(!chosen){toast('Please choose a time first.');return}el('submitBtn').disabled=true;el('submitBtn').textContent='Sending request…';try{let r=await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slotId:chosen.id,name:el('visitorName').value.trim(),email:el('visitorEmail').value.trim(),phone:el('visitorPhone').value.trim(),message:el('visitorMessage').value.trim(),otherName:el('sendOther').checked?el('otherName').value.trim():'',otherEmail:el('sendOther').checked?el('otherEmail').value.trim():''})});if(r.status===409){toast('Apologies, this time is no longer available.');closeP();await refresh();return}if(!r.ok)throw new Error('request failed');markRequested(chosen.id);}catch(err){toast('We could not complete the request. Please try again later or contact Sherborne.');el('submitBtn').disabled=false;el('submitBtn').textContent='Request consultation';return}el('submitBtn').disabled=false;el('submitBtn').textContent='Request consultation';el('formView').style.display='none';el('ptitle').textContent='Request received';el('thanks').classList.add('open');};(function swipe(){let sx=0,sy=0,st=0,tracking=false;const node=el('shell');node.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=Date.now();tracking=true;});node.addEventListener('pointerup',e=>{if(!tracking)return;tracking=false;let dx=e.clientX-sx,dy=e.clientY-sy,dt=Date.now()-st,fast=Math.abs(dx)>30&&dt<260,far=Math.abs(dx)>55;if(Math.abs(dx)>Math.abs(dy)*1.35&&(fast||far)){if(window.innerWidth<=760)moveDay(dx<0?1:-1);else movePage(dx<0?1:-1);}});})();loadRequested();load(false).then(()=>{page=firstPageWithAvailability();active=0;render();setInterval(refresh,120000)});
</script></body></html>
