<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Sherborne</title>

<style>
body{font-family:sans-serif;background:#fffdf8;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.trigger{height:20px;background:rgba(0,0,0,.05);margin-bottom:12px}

.slot{
 display:flex;
 justify-content:center;
 padding:10px;
 margin:6px;
 background:#e8efe7;
 border-radius:8px;
 cursor:pointer
}

.meta{
 position:fixed;
 bottom:10px;
 right:10px;
 font-size:11px;
 opacity:.4
}

.panel{
 position:fixed;
 left:0;
 top:0;
 width:320px;
 height:100%;
 background:white;
 transform:translateX(-100%);
 transition:.3s;
 padding:20px
}

.panel.open{transform:translateX(0)}

input,textarea{
 width:100%;
 margin-bottom:10px;
 padding:6px
}
</style>
</head>

<body>

<div class="container">
<div id="trigger" class="trigger"></div>
<div id="app"></div>
</div>

<div id="panel" class="panel">
<h3>Request time</h3>
<input id="name" placeholder="Your name">
<input id="email" placeholder="Your email">
<textarea id="message" placeholder="Message"></textarea>

<button onclick="submitRequest()">Send request</button>
<button onclick="closePanel()">Close</button>
</div>

<div id="meta" class="meta"></div>

<script>
let cells=[], selected=null, internal=false, timer=null

async function load(){
 const r=await fetch('/api/availability')
 cells=(await r.json()).cells
 render()
 meta.textContent='v13 · '+new Date().toLocaleTimeString()
}

function render(){
 app.innerHTML=cells.filter(c=>c.bookable).map(c=>{
  return `<div class="slot" data-id="${c.id}">
   Request ${new Date(c.startUtc).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
  </div>`
 }).join('')

 document.querySelectorAll('.slot').forEach(el=>{
  let clicks=0
  el.onclick=()=>{
   clicks++; setTimeout(()=>clicks=0,250)

   if(internal && clicks===2){
    createInternal(el.dataset.id)
    return
   }

   if(clicks===2){
    selected=el.dataset.id
    openPanel()
   }
  }
 })
}

function openPanel(){panel.classList.add('open')}
function closePanel(){panel.classList.remove('open')}

trigger.ondblclick=()=>{
 internal=true
 meta.style.opacity=0
 timer=setTimeout(()=>{internal=false;meta.style.opacity=.4},15000)
}

async function createInternal(id){
 await fetch('/api/book',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({slotId:id,internal:true})
 })
 internal=false
 meta.style.opacity=.4
}

async function submitRequest(){
 await fetch('/api/book',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   slotId:selected,
   name:name.value,
   email:email.value,
   message:message.value
  })
 })
 closePanel()
}

load()
</script>

</body>
</html>
